<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>Definições <button class="modal-close" onclick="closeModal('settings-modal')">✕</button></h3>
    <button class="btn-secondary" onclick="exportData()">⬇ Exportar dados (JSON)</button>
    <label class="btn-secondary" style="display:block;text-align:center;cursor:pointer">⬆ Importar dados (JSON)
      <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(event)"/>
    </label>
    <button class="btn-secondary" onclick="loadFromGitHub()">↻ Sincronizar agora</button>
    <button class="btn-danger" onclick="resetToken()">🔓 Esquecer token GitHub</button>
  </div>
</div>
