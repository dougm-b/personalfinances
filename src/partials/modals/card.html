<div class="modal-overlay" id="card-modal">
  <div class="modal">
    <h3><span id="card-modal-title">Novo Cartão</span><button class="modal-close" onclick="closeModal('card-modal')">✕</button></h3>
    <input type="hidden" id="card-id"/>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="card-name" placeholder="Ex: WiZink"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Limite (€)</label><input class="form-input" id="card-limit" type="number" step="0.01"/></div>
      <div class="form-group"><label class="form-label">Valor Utilizado (€)</label><input class="form-input" id="card-used" type="number" step="0.01"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">A pagar este mês (€)</label><input class="form-input" id="card-monthly" type="number" step="0.01" placeholder="Ex: 200"/></div>
      <div class="form-group"><label class="form-label">Dia do débito no mês</label><input class="form-input" id="card-dueday" type="number" min="1" max="31" placeholder="Ex: 11"/></div>
    </div>
    <button class="btn-primary" onclick="saveCard()">Guardar</button>
    <button class="btn-danger" id="card-delete-btn" onclick="deleteCard()" style="display:none">Eliminar cartão</button>
  </div>
</div>


<div class="modal-overlay" id="financed-modal">
  <div class="modal">
    <h3><span id="financed-modal-title">Nova Compra Financiada</span><button class="modal-close" onclick="closeModal('financed-modal')">✕</button></h3>
    <input type="hidden" id="fin-card-id"/><input type="hidden" id="fin-id"/>
    <div class="form-group"><label class="form-label">Descrição</label><input class="form-input" id="fin-desc" placeholder="Ex: iPhone (crédito)"/></div>
    <div class="form-group"><label class="form-label">Valor total (€)</label><input class="form-input" id="fin-total" type="number" step="0.01"/></div>
    <div class="note-box" style="margin-bottom:12px">O valor em falta é calculado automaticamente: total − prestações já debitadas (desde o 1º mês, no dia de débito do cartão).</div>
    <div class="form-group"><label class="form-label">Prestação mensal (€)</label><input class="form-input" id="fin-installment" type="number" step="0.01" placeholder="Deixa vazio se não tiver prestação fixa"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">1º mês da prestação</label><input class="form-input" id="fin-start" type="month"/></div>
      <div class="form-group"><label class="form-label">Nº de prestações</label><input class="form-input" id="fin-months" type="number" min="1" placeholder="ex: 24"/></div>
    </div>
    <button class="btn-primary" onclick="saveFinancedItem()">Guardar</button>
    <button class="btn-danger" id="fin-delete-btn" onclick="deleteFinancedItem()" style="display:none">Eliminar</button>
  </div>
</div>


<div class="modal-overlay" id="card-detail-modal">
  <div class="modal">
    <h3><span id="cd-title">Cartão</span><span style="display:flex;gap:8px"><button class="modal-close" id="cd-edit" title="Editar cartão">✎</button><button class="modal-close" onclick="closeModal('card-detail-modal')">✕</button></span></h3>
    <div id="cd-body"></div>
    <button class="btn-primary" id="cd-add-fin">+ Compra a prestações</button>
    <button class="btn-secondary" id="cd-add-buy">+ Compra avulsa (aumenta o utilizado)</button>
    <button class="btn-secondary" id="cd-add-pay">− Pagamento avulso (reduz o utilizado)</button>
  </div>
</div>

<div class="modal-overlay" id="card-adj-modal">
  <div class="modal">
    <h3><span id="ca-title">Movimento</span><button class="modal-close" onclick="closeModal('card-adj-modal')">✕</button></h3>
    <input type="hidden" id="ca-card-id"/><input type="hidden" id="ca-sign"/>
    <div class="form-group"><label class="form-label">Descrição</label><input class="form-input" id="ca-desc" placeholder="Ex: compra supermercado / pagamento da fatura"/></div>
    <div class="form-group"><label class="form-label">Valor (€)</label><input class="form-input" id="ca-amount" type="number" step="0.01" min="0"/></div>
    <button class="btn-primary" onclick="saveCardAdj()">Guardar</button>
  </div>
</div>
