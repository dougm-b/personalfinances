    <!-- ══════════ DASHBOARD ══════════ -->
    <div class="screen active" id="dash-screen">
      <div class="card hero">
        <div onclick="openNetWorthDetail()" style="cursor:pointer">
          <div class="hero-lbl" id="d-net-lbl">Património líquido</div>
          <div class="hero-val" id="d-networth">€0</div>
          <div class="hero-sub">
            <span>Investido <b id="d-invest">€0</b></span>
            <span>À ordem <b id="d-ordem">€0</b></span>
          </div>
        </div>
        <div class="sim-nav">
          <button class="sim-btn" onclick="dashShift(-1)">‹</button>
          <span class="sim-label" id="d-sim-label" style="position:relative;cursor:pointer">
            <span id="d-sim-label-txt">Hoje ▾</span>
            <input type="month" id="d-sim-month" onchange="dashPickMonth(this.value)"
              style="position:absolute;inset:0;opacity:0;width:100%;height:100%;border:0;cursor:pointer"/>
          </span>
          <button class="sim-btn" onclick="dashShift(1)">›</button>
        </div>
        <div class="row-detail" id="d-sim-note" style="display:none;margin-top:8px;text-align:left"></div>
      </div>

      <div class="stat-grid" style="margin-bottom:12px">
        <div class="stat-box" onclick="openMonthBalance()" style="cursor:pointer"><div class="l">Receitas (mês) →</div><div class="v pos" id="d-income">€0</div></div>
        <div class="stat-box" onclick="openMonthBalance()" style="cursor:pointer"><div class="l">Despesas (mês) →</div><div class="v neg" id="d-expense">€0</div></div>
      </div>

      <div class="card">
        <div class="card-title">Cartão de Crédito</div>
        <div id="d-cards"></div>
      </div>

      <div class="card">
        <div class="card-title">Empréstimo Casa (Deny e Mauricio)</div>
        <div id="d-loan"></div>
      </div>

      <div class="card">
        <div class="card-title">Despesas por Categoria (mês)</div>
        <div id="d-cats"></div>
      </div>

      <div class="card">
        <div class="card-title">Histórico Mensal</div>
        <div id="d-months"></div>
      </div>

      <div class="card">
        <div class="card-title">Próximas Fixas</div>
        <div id="d-bills"></div>
      </div>

      <div class="card">
        <div class="card-title">Últimas Transações</div>
        <div id="d-recent"></div>
      </div>
    </div>
