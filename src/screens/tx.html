    <!-- ══════════ TRANSAÇÕES ══════════ -->
    <div class="screen" id="tx-screen">
      <div class="sim-nav" style="margin:4px 0 10px">
        <button class="sim-btn" onclick="txShiftMonth(-1)">‹</button>
        <span class="sim-label" id="tx-month-label">—</span>
        <button class="sim-btn" onclick="txShiftMonth(1)">›</button>
      </div>
      <div class="section-hdr"><h3>Transações</h3><span style="display:flex;gap:8px">
        <button class="add-btn" style="background:var(--g3);color:var(--txt2)" title="Organizar" onclick="toggleTxSortMenu(event)">⇅</button>
        <button class="add-btn" onclick="openTxModal()">+ Nova</button></span></div>
      <div id="tx-sort-menu" class="card" style="display:none;padding:8px 12px">
        <div class="row" style="margin-bottom:4px" onclick="setTxSort('date')"><div class="row-info"><div class="row-name" id="ts-date">📅 Por data</div></div></div>
        <div class="row" style="margin-bottom:4px" onclick="setTxSort('valueDesc')"><div class="row-info"><div class="row-name" id="ts-desc">⬇ Valor: do maior para o menor</div></div></div>
        <div class="row" style="margin-bottom:0" onclick="setTxSort('valueAsc')"><div class="row-info"><div class="row-name" id="ts-asc">⬆ Valor: do menor para o maior</div></div></div>
      </div>
      <div class="chip-row" id="tx-filter-chips"></div>
      <div id="tx-list"></div>

      <div class="card" style="margin-top:16px">
        <div class="card-title">Fechamento do Mês</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="l">Total recebido</div><div class="v pos" id="tx-close-inc">€0</div></div>
          <div class="stat-box"><div class="l">Total pago</div><div class="v neg" id="tx-close-exp">€0</div></div>
        </div>
        <div class="stat-box" style="margin-top:10px;cursor:pointer" onclick="openLeftoverSim()">
          <div class="l">Balanço das operações → toca para simular os meses futuros</div>
          <div class="v" id="tx-close-net">€0</div>
        </div>
      </div>
    </div>
