    <!-- ══════════ FIXAS ══════════ -->
    <div class="screen" id="bills-screen">
      <div class="sim-nav" style="margin:4px 0 10px">
        <button class="sim-btn" onclick="billsShiftMonth(-1)">‹</button>
        <span class="sim-label" id="bills-month-label">—</span>
        <button class="sim-btn" onclick="billsShiftMonth(1)">›</button>
      </div>
      <div class="card">
        <div class="card-title">Fixas do Mês</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="l">Despesas</div><div class="v neg" id="bills-total-exp">€0</div></div>
          <div class="stat-box"><div class="l">Receitas</div><div class="v pos" id="bills-total-inc">€0</div></div>
        </div>
      </div>
      <div class="section-hdr"><h3>Futuras</h3><span style="display:flex;gap:8px">
        <button class="add-btn" style="background:var(--g3);color:var(--txt2)" title="Organizar" onclick="toggleBillsSortMenu(event)">⇅</button>
        <button class="add-btn" onclick="openBillModal()">+ Novo</button></span></div>
      <div id="bills-sort-menu" class="card" style="display:none;padding:8px 12px">
        <div class="row" style="margin-bottom:4px" onclick="setBillsSort('day')"><div class="row-info"><div class="row-name" id="bs-day">📅 Por data de débito</div></div></div>
        <div class="row" style="margin-bottom:4px" onclick="setBillsSort('valueDesc')"><div class="row-info"><div class="row-name" id="bs-desc">⬇ Valor: do maior para o menor</div></div></div>
        <div class="row" style="margin-bottom:0" onclick="setBillsSort('valueAsc')"><div class="row-info"><div class="row-name" id="bs-asc">⬆ Valor: do menor para o maior</div></div></div>
      </div>
      <div id="bills-future"></div>
      <div class="section-hdr"><h3>Passadas</h3>
        <button class="add-btn" style="background:var(--g3);color:var(--txt2)" title="Organizar" onclick="toggleBillsSortMenu(event)">⇅</button></div>
      <div id="bills-past"></div>

      <div class="card" style="margin-top:16px">
        <div class="card-title">Fechamento do Mês</div>
        <div class="stat-grid">
          <div class="stat-box"><div class="l">Total recebido</div><div class="v pos" id="bills-close-inc">€0</div></div>
          <div class="stat-box"><div class="l">Total pago</div><div class="v neg" id="bills-close-exp">€0</div></div>
        </div>
        <div class="stat-box" style="margin-top:10px;cursor:pointer" onclick="openLeftoverSim()">
          <div class="l">Sobra das operações do mês → toca para simular os meses futuros</div>
          <div class="v" id="bills-close-net">€0</div>
        </div>
      </div>

    </div>
